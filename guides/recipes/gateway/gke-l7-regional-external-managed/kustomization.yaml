apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - target:
      kind: Gateway
      name: infra-pd-inference-gateway
    patch: |-
      - op: add
        path: /spec/gatewayClassName
        value: gke-l7-regional-external-managed
  - target:
      kind: HTTPRoute
      name: llm-d-pd-disaggregation
    patch: |-
      - op: remove
        path: /spec/rules/0/timeouts
