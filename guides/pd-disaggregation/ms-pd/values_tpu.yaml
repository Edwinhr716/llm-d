multinode: false

# Distributed tracing configuration (OpenTelemetry)
# tracing:
#   enabled: true
#   otlpEndpoint: "http://otel-collector:4317"
#   sampling:
#     sampler: "parentbased_traceidratio"
#     samplerArg: "0.1"

# Configure accelerator type for Google TPU
accelerator:
  type: google

serviceAccountOverride: "vllm-sa"

modelArtifacts:
  uri: "hf://Qwen/Qwen3-32B"
  name: "Qwen/Qwen3-32B"
  size: 80Gi
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "pd-disaggregation"
    llm-d.ai/hardware-variant: "tpu"
    llm-d.ai/hardware-vendor: "google"
    llm-d.ai/model: "qwen-3-32b"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
    connector: nixlv2
    secure: false

decode:
  parallelism:
    tensor: 8
  create: true
  replicas: 1
  extraConfig:
    nodeSelector:
      cloud.google.com/gke-tpu-topology: "2x4"
      cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: vllm/vllm-tpu:v0.13.2
      modelCommand: custom
      command:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
      args:
      - "--host=0.0.0.0"
      - "--port=8200"
      - "--model=gs://edwinhernandez-v6e-pd/Qwen/Qwen3-32B"
      - "--tensor-parallel-size"
      - "8"
      - "--served-model-name=Qwen/Qwen3-32B"
      - "--load-format=runai_streamer"
      - "--kv-transfer-config"
      - '{"kv_connector":"TPUConnector", "kv_connector_module_path" : "tpu_inference.distributed.tpu_connector", "kv_role":"kv_both", "kv_ip" : "$(POD_IP)"}'
      - "--max-model-len"
      - "9216"
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TPU_SIDE_CHANNEL_PORT # data plane port for PD coordination
          value: "9600" # default for TPU
        - name: TPU_KV_TRANSFER_PORT # Port where the KV transfer actually happens
          value: "9100" # default for TPU
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
        - containerPort: 9100
          name: tpu-kv-transfer
          protocol: TCP
        - containerPort: 9600
          name: tpu-pd-coord
          protocol: TCP
      resources:
        limits:
          memory: 64Gi
          cpu: "16"
          # note: TPU resources get controlled by parallelism + accelerators above
        requests:
          memory: 64Gi
          cpu: "16"
          # note: TPU resources get controlled by parallelism + accelerators above
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
      startupProbe:
        httpGet:
          path: /health
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 120
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "16Gi"
    - name: torch-compile-cache
      emptyDir: {}

prefill:
  parallelism:
    tensor: 8
  create: true
  replicas: 1
  extraConfig:
    nodeSelector:
      cloud.google.com/gke-tpu-topology: "2x4"
      cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # prefill vLLM service port (from routing.servicePort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: vllm/vllm-tpu:v0.13.2
      modelCommand: custom
      command:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
      args:
      - "--model=gs://edwinhernandez-v6e-pd/Qwen/Qwen3-32B"
      - "--tensor-parallel-size"
      - "8"
      - "--served-model-name=Qwen/Qwen3-32B"
      - "--load-format=runai_streamer"
      - "--kv-transfer-config"
      - '{"kv_connector":"TPUConnector", "kv_connector_module_path" : "tpu_inference.distributed.tpu_connector", "kv_role":"kv_producer", "kv_ip" : "$(POD_IP)"}'
      - "--max-model-len"
      - "9216"
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TPU_SIDE_CHANNEL_PORT # data plane port for PD coordination
          value: "9600" # default for TPU
        - name: TPU_KV_TRANSFER_PORT # Port where the KV transfer actually happens
          value: "9100" # default for TPU
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
        - containerPort: 9100
          name: tpu-kv-transfer
          protocol: TCP
        - containerPort: 9600
          name: tpu-pd-coord
          protocol: TCP
      resources:
        limits:
          memory: 64Gi
          cpu: "16"
          # note: TPU resources get controlled by parallelism + accelerators above
        requests:
          memory: 64Gi
          cpu: "16"
          # note: TPU resources get controlled by parallelism + accelerators above
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
      startupProbe:
        httpGet:
          path: /health
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 120
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "16Gi"
    - name: torch-compile-cache
      emptyDir: {}
