multinode: false

# Distributed tracing configuration (OpenTelemetry)
# tracing:
#   enabled: true
#   otlpEndpoint: "http://otel-collector:4317"
#   sampling:
#     sampler: "parentbased_traceidratio"
#     samplerArg: "0.1"

# Configure accelerator type for Google TPU
accelerator:
  type: google

modelArtifacts:
  uri: "hf://BCCard/Qwen3-Coder-480B-A35B-Instruct-FP8-Dynamic"
  size: 800Gi
  authSecretName: "llm-d-hf-token"
  name: "BCCard/Qwen3-Coder-480B-A35B-Instruct-FP8-Dynamic"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "pd-disaggregation"
    llm-d.ai/hardware-variant: "tpu"
    llm-d.ai/hardware-vendor: "google"
    llm-d.ai/model: "Llama-3.3-70B-Instruct"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.6.0
    connector: nixlv2
    secure: false

decode:
  parallelism:
    tensor: 8
  create: true
  replicas: 3
  extraConfig:
    nodeSelector:
      cloud.google.com/gke-tpu-topology: "2x2x1"
      cloud.google.com/gke-tpu-accelerator: "tpu7x"
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: vllm/vllm-tpu:nightly-ironwood-20260204-1981c89-010ec0c
      modelCommand: vllmServe
      args:
        # Keep tensor-parallelism as the first set of arguments
        - "--tensor-parallel-size"
        - "8"
        - "--kv-transfer-config"
        - '{"kv_connector":"TPUConnector", "kv_connector_module_path" : "tpu_inference.distributed.tpu_connector", "kv_role":"kv_consumer", "kv_ip" : "$(POD_IP)"}'
        - "--disable-uvicorn-access-log"
        - "--max-model-len=10240"
        - "--max-num-batched-tokens=8192"
        - "--max-num-seqs=512"
        - "--enable-expert-parallel"
        - "--kv-cache-dtype=fp8"
        - "--no-async-scheduling"
        - "--no-enable-prefix-caching"
        - "--gpu-memory-utilization=0.95"
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TPU_SIDE_CHANNEL_PORT # data plane port for PD coordination
          value: "9600" # default for TPU
        - name: TPU_KV_TRANSFER_PORT # Port where the KV transfer actually happens
          value: "9100" # default for TPU
        - name: MODEL_IMPL_TYPE
          value: "vllm"
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
        - containerPort: 9100
          name: tpu-kv-transfer
          protocol: TCP
        - containerPort: 9600
          name: tpu-pd
          protocol: TCP
      resources:
        limits:
          memory: 64Gi
          cpu: "16"
          google.com/tpu: 4
        requests:
          memory: 64Gi
          cpu: "16"
          google.com/tpu: 4
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
      startupProbe:
        httpGet:
          path: /health
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 120
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "16Gi"
    - name: torch-compile-cache
      emptyDir: {}

prefill:
  parallelism:
    tensor: 8
  create: true
  replicas: 1
  extraConfig:
    nodeSelector:
      cloud.google.com/gke-tpu-topology: "2x2x1"
      cloud.google.com/gke-tpu-accelerator: "tpu7x"
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # prefill vLLM service port (from routing.servicePort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: vllm/vllm-tpu:nightly-ironwood-20260204-1981c89-010ec0c
      modelCommand: vllmServe
      args:
        - "--tensor-parallel-size"
        - "8"
        - "--kv-transfer-config"
        - '{"kv_connector":"TPUConnector", "kv_connector_module_path" : "tpu_inference.distributed.tpu_connector", "kv_role":"kv_producer", "kv_ip" : "$(POD_IP)"}'
        - "--disable-uvicorn-access-log"
        - "--max-model-len=10240"
        - "--max-num-batched-tokens=8192"
        - "--max-num-seqs=512"
        - "--enable-expert-parallel"
        - "--kv-cache-dtype=fp8"
        - "--no-async-scheduling"
        - "--no-enable-prefix-caching"
        - "--gpu-memory-utilization=0.95"
      env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TPU_SIDE_CHANNEL_PORT # data plane port for PD coordination
          value: "9600" # default for TPU
        - name: TPU_KV_TRANSFER_PORT # Port where the KV transfer actually happens
          value: "9100" # default for TPU
        - name: MODEL_IMPL_TYPE
          value: "vllm"
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
        - containerPort: 9100
          name: tpu-kv-transfer
          protocol: TCP
        - containerPort: 9600
          name: tpu-pd
          protocol: TCP
      resources:
        limits:
          memory: 64Gi
          cpu: "16"
          google.com/tpu: 4
        requests:
          memory: 64Gi
          cpu: "16"
          google.com/tpu: 4
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
      startupProbe:
        httpGet:
          path: /health
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 120
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "16Gi"
    - name: torch-compile-cache
      emptyDir: {}
