apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-decode
spec:
  replicas: 3
  selector:
    matchLabels:
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/hardware-variant: tpu
      llm-d.ai/hardware-vendor: google
      llm-d.ai/inference-serving: 'true'
      llm-d.ai/model: Llama-3.3-70B-Instruct
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/hardware-variant: tpu
        llm-d.ai/hardware-vendor: google
        llm-d.ai/inference-serving: 'true'
        llm-d.ai/model: Llama-3.3-70B-Instruct
        llm-d.ai/role: decode
    spec:
      serviceAccountName: vllm-sa
      nodeSelector:
        cloud.google.com/gke-tpu-topology: 2x2x1
        cloud.google.com/gke-tpu-accelerator: tpu7x
      initContainers:
      - args:
        - --port=8000
        - --vllm-port=8200
        - --connector=nixlv2
        - --zap-encoder=json
        - --zap-log-level=debug
        - --secure-proxy=false
        image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.6.0
        imagePullPolicy: Always
        restartPolicy: Always
        name: routing-proxy
        ports:
          - containerPort: 8000
        resources: {}
      containers:
      - name: vllm-tpu
        image: vllm/vllm-tpu:nightly-ironwood-20260204-1981c89-010ec0c
        imagePullPolicy: Always
        command: [ "/bin/bash", "-c", "--" ]
        args: ["vllm serve --seed=42 --port=8200 --model=gs://qwen-for-gke-benchmarking/Bccard-Qwen3-Coder-480B-A35B-Instruct --served-model-name=BCCard/Qwen3-Coder-480B-A35B-Instruct-FP8-Dynamic --load-format=runai_streamer --max-model-len=10240 --max-num-batched-tokens=8192 --max-num-seqs=512 --no-enable-prefix-caching --disable-log-requests --tensor-parallel-size=8 --kv-cache-dtype=fp8 --gpu-memory-utilization=0.95 --async-scheduling --enable-expert-parallel --kv-transfer-config '{\"kv_connector\":\"TPUConnector\",\"kv_connector_module_path\":\"tpu_inference.distributed.tpu_connector\",\"kv_role\":\"kv_consumer\"}'"]
        #args: [ "while true; do sleep 300; done;" ]
        env:
        - name: VLLM_HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TPU_SIDE_CHANNEL_PORT # data plane port for PD coordination
          value: "9600" # default for TPU
        - name: TPU_KV_TRANSFER_PORT # Port where the KV transfer actually happens
          value: "9100" # default for TPU
        - name: MODEL_IMPL_TYPE
          value: "vllm"
        - name: USE_MOE_EP_KERNEL
          value: "1"
        - name: JAX_PLATFORMS
          value: "tpu,cpu"
        - name: TPU_BACKEND_TYPE
          value: jax
        - name: PJRT_DEVICE
          value: TPU
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              key: HF_TOKEN
              name: llm-d-hf-token
        ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
        - containerPort: 9100
          name: tpu-kv-transfer
          protocol: TCP
        - containerPort: 9600
          name: tpu-pd
          protocol: TCP
        resources:
          limits:
            google.com/tpu: 4
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory